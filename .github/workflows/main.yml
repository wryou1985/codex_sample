name: Append Date to codex_test.md

on:
  schedule:
    - cron: "0 3 * * *" # 日本時間12:00 = UTC 03:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  append-date:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Append current date
        run: |
          {
            echo ""
            echo "- $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S %Z')"
          } >> codex_test.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add codex_test.md
          git commit -m "Append daily date to codex_test.md"
          git push
